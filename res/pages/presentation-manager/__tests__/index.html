<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Time Tracker's Unit Test</title>
    <link rel="stylesheet" href="mocha/mocha.css" />
    <style>
        .example {
          display: none;
        }
    </style>
  </head>
  <body>

    <!-- Sessão principal -->

    <div class="col-10 strophes">
      <div class="strophe example row">
          <!-- Operações em relação a estrofe, como alterar a ordem, editar, etc.. -->
          <div class="options col-1">
              <span class="number">1</span><br>
              <span class="up">
                  <i class="fas fa-arrow-up"></i>
              </span>
              <span class="down">
                  <i class="fas fa-arrow-down"></i>
              </span>
              <span class="delete-strophe">
                  <i class="fas fa-trash"></i>
              </span>
              <span class="new-slide" title="Novo Slide">
                  <i class="fas fa-plus-circle"></i>
              </span>
          </div>

          <!-- Onde ficam os slides da estrofe -->
          <div class="slides col-9">
              <textarea class="slide" data-autoresize rows="1"></textarea>
          </div>

          <!-- Pra ficar uma margem ao lado -->
          <div class="col-2"></div>
      </div>

      <footer>

      </footer>
  </div>

    <!-- Load the dependences to test -->
    <script src="../assets/js/jquery-3.4.1.min.js"></script>
    <script src="../lib/lib.js"></script>
    <script src="../src/model/strophe-element.js"></script>
    <script src="../src/controller/strophe-controller.js"></script>
    <script src="../src/controller/slide-controller.js"></script>
    <script src="../src/view/slide-view.js"></script>
    <script src="../src/view/strophe-view.js"></script>
    <script src="../src/main.js"></script>

    <!-- Mocha Test -->
    <div id="mocha"></div>
    <script src="mocha/chai.js"></script>
    <script src="mocha/mocha.js"></script>
    <script class="mocha-init">
      mocha.setup('bdd');
      //mocha.checkLeaks();
      mocha.setup({globals: ['hasCert']});
    </script>
    <script src="src/strophe-test.js"></script>



    <script class="mocha-exec">
      $(document).ready(function() {
        mocha.run();
      })

    </script>
  </body>
</html>
