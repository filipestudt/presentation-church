<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Editor</title>
        <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/all.css">
        <link rel="stylesheet" href="assets/css/main.css">
    </head>
    <body>
        <header>
            <nav id="navbar">
                <div class="row">
                    <div class="col-5">
                        <input type="text" id="name" value="Sem título">
                    </div>
                    <div class="col-5 category">
                        <b><i>Categoria:</i></b>
                        <select id="category">
                            <option value="Hinos">Hinos</option>
                            <option value="HCC">HCC</option>
                            <option value="CC">CC</option>
                            <option value="Favoritos">Favoritos</option>
                        </select>
                    </div>
                    <div class="col-2">
                        <button id="save">Salvar</button>
                    </div>
                </div>
            </nav>
        </header>

        <!-- Sessão principal -->
        <section id="main">

            <div class="row">

                <div id="left-bar" class="col-2">
                    <ul>
                        <li id="new-strophe">
                            <i class="fas fa-plus-circle"></i>
                            <span>Nova Estrofe</span>
                        </li>
                        <li id="new-chorus">
                            <i class="fas fa-plus"></i>
                            <span>Novo Coro</span>
                        </li>
                    </ul>
                </div>

                <div class="col-10 strophes">
                    <div class="strophe example row">
                        <!-- Operações em relação a estrofe, como alterar a ordem, editar, etc.. -->
                        <div class="options col-1">
                            <span class="number">1</span><br>
                            <span class="up">
                                <i class="fas fa-arrow-up"></i>
                            </span>
                            <span class="down">
                                <i class="fas fa-arrow-down"></i>
                            </span>
                            <span class="delete-strophe">
                                <i class="fas fa-trash"></i>
                            </span>
                            <!-- <span class="new-slide" title="Novo Slide">
                                <i class="fas fa-plus-circle"></i>
                            </span>                             -->
                        </div>

                        <!-- Onde ficam os slides da estrofe -->
                        <div class="slides col-9">
                            <!-- <textarea class="slide" data-autoresize rows="1"></textarea> -->
                            <textarea class="slide"></textarea>
                        </div>

                        <!-- Pra ficar uma margem ao lado -->
                        <div class="col-2"></div>
                    </div>

                    <footer>

                    </footer>
                </div>

            </div>


        </section>

        <script>
			if (typeof module === 'object') {
				window.module = module;
				module = undefined;
			}
		</script>

        <script src="assets/js/jquery-3.4.1.min.js"></script>
        <script src="assets/js/bootstrap.min.js"></script>
        <script src="assets/js/all.js"></script>
        <script src="lib/lib.js"></script>
        <script src="lib/request.js"></script>

        <script src="src/model/strophe-element.js"></script>

        <script src="src/controller/strophe-controller.js"></script>
        <script src="src/controller/slide-controller.js"></script>
        <script src="src/view/strophe-view.js"></script>
        <script src="src/view/slide-view.js"></script>

        <script src="src/main.js"></script>
    </body>
</html>
