<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Settings</title>
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css">

<body>
    <div class="container d-flex flex-column theme-light" id="main">
        <label>IP Fixo</label>
        <span class="hr"></span>
        <div class="btn-toggle"></div>
        <input type="text" id="ip" class="form-control input" placeholder="IP" disabled>

        <label>Tamanho da fonte</label>
        <span class="hr"></span>
        <input id="font-size" class="form-control input">

        <label>Estilo do texto</label>
        <span class="hr"></span>
        <select class="form-control input">
            <option>Normal</option>
            <option>Itálico</option>
            <option>Negrito</option>
        </select>

        <label>Cor do texto(hexadecimal, ex: #ffffff)</label>

        <!-- 
        <span class="hr"></span>

        <div class="btn btn-success" id="btn-save">Salvar</div>
    </div>

    <script>
        if (typeof module === 'object') {
            window.module = module;
            module = undefined;
        }
    </script>
    <script src="../../assets/js/jquery-3.4.1.min.js"></script>
    <script src="../../assets/js/bootstrap.min.js"></script>
    <script src="../../assets/js/all.js"></script>
    <script src="../../cfg.js"></script>
